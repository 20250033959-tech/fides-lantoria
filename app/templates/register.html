{% extends 'base.html' %}
{% block content %}

<div style="max-width: 460px; margin: 3rem auto;">
  <div class="card">
    <h2>Create Account</h2>
    <p style="color:#888; font-size:0.9rem; margin-bottom:1.5rem;">
      Fill in the details below to register
    </p>

    <form method="POST" action="{{ url_for('main.register') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="e.g. alexa123">
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Min 8 characters">
      </div>

      <div class="form-group">
        <label for="role">Account type</label>
        <select id="role" name="role">
          <option value="user">User — access my own notes only</option>
          <option value="admin">Admin — access all records</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">
        Create Account
      </button>
    </form>

    <p style="text-align:center; margin-top:1.2rem; font-size:0.9rem; color:#666;">
      Already registered? <a href="{{ url_for('main.login') }}" style="color:#e94560;">Log in</a>
    </p>
  </div>
</div>

{% endblock %}
